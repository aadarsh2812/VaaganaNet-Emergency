version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: ambulance_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ambulance_db
    volumes:
      - mongo_data:/data/db
    networks:
      - ambulance_net

  backend-control:
    build: ./backend
    container_name: ambulance_backend_control
    restart: always
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=ambulance_db
    command: uvicorn services.control.main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      - mongodb
    networks:
      - ambulance_net
    volumes:
      - ./backend:/app

  backend-simulation:
    build: ./backend
    container_name: ambulance_backend_simulation
    restart: always
    ports:
      - "8002:8002"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=ambulance_db
    command: uvicorn services.simulation.main:app --host 0.0.0.0 --port 8002 --reload
    depends_on:
      - mongodb
    networks:
      - ambulance_net
    volumes:
      - ./backend:/app

  backend-ambulance:
    build: ./backend
    container_name: ambulance_backend_ambulance
    restart: always
    ports:
      - "8003:8003"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=ambulance_db
    command: uvicorn services.ambulance.main:app --host 0.0.0.0 --port 8003 --reload
    depends_on:
      - mongodb
    networks:
      - ambulance_net
    volumes:
      - ./backend:/app

  backend-hospital:
    build: ./backend
    container_name: ambulance_backend_hospital
    restart: always
    ports:
      - "8004:8004"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=ambulance_db
    command: uvicorn services.hospital.main:app --host 0.0.0.0 --port 8004 --reload
    depends_on:
      - mongodb
    networks:
      - ambulance_net
    volumes:
      - ./backend:/app

volumes:
  mongo_data:

networks:
  ambulance_net:
    driver: bridge
